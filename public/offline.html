<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline</title>
    <style>
        :root {
            color-scheme: light dark;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            background: #111827;
            color: #f9fafb;
            padding: 1rem;
        }

        .card {
            width: min(420px, 100%);
            border: 1px solid #374151;
            border-radius: 12px;
            background: #1f2937;
            padding: 1.25rem;
        }

        h1 {
            margin: 0 0 0.5rem;
            font-size: 1.125rem;
        }

        p {
            margin: 0;
            line-height: 1.5;
            color: #d1d5db;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>You are offline</h1>
        <p>
            Please reconnect to continue using the system. Previously loaded pages and assets may still be available.
        </p>
    </main>
</body>
</html>
